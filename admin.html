<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Console Admin - Nostalgia</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="admin-body">
    <div class="arcade-container admin-panel">
      <h1 class="pixel-title" style="font-size: 0.8rem">ADMIN DASHBOARD</h1>

      <div
        style="border: 2px solid #00ffff; padding: 10px; margin-bottom: 20px"
      >
        <label style="font-size: 0.4rem; color: #00ffff"
          >UPDATE FOLLOWERS:</label
        ><br />
        <input
          type="number"
          id="newFollowers"
          class="arcade-input"
          style="width: 70%; margin: 10px 0"
        />
        <button
          id="updateScoreBtn"
          class="start-btn"
          style="padding: 5px; font-size: 0.4rem"
        >
          OK
        </button>
      </div>

      <p style="font-size: 0.4rem; color: #ff00ff; margin-bottom: 10px">
        LISTA PLAYER:
      </p>
      <ul id="adminList" class="soci-list"></ul>

      <button onclick="window.location.href = 'index.html'" class="hall-btn">
        ESCI
      </button>
    </div>
    <script type="module" src="admin.js"></script>
  </body>
</html>
