<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progetto Nostalgia | Work in Progress</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="arcade-container">
      <header>
        <h1 class="pixel-title">PROGETTO NOSTALGIA</h1>

        <div class="high-score-board">
          <div class="score-label">FOLLOWER</div>
          <div class="score-number">001019</div>
        </div>
      </header>

      <main>
        <p class="insert-coin">DIVENTA PROTAGONISTA</p>

        <div class="input-section">
          <p class="mission-text">
            IL TUO RICORDO DIVENTERÀ UN VIDEO SU TIKTOK! 🎬
          </p>

          <input
            type="text"
            id="userName"
            placeholder="IL TUO NOME..."
            class="arcade-input"
          />

          <p class="input-label">COSA VUOI RIVEDERE DEGLI ANNI '90?</p>
          <input
            type="text"
            id="userSuggestion"
            placeholder="ES: LE CRYSTAL BALL..."
            class="arcade-input"
          />

          <button id="submitBtn" class="start-btn">INVIA GETTONE</button>

          <p
            id="confirmation"
            style="
              display: none;
              font-size: 0.8rem;
              color: #ff00ff;
              margin-top: 20px;
            "
          >
            GETTONE ACCETTATO! CI VEDIAMO NEI PER TE! 🎥
          </p>
        </div>
        <div class="hall-of-fame">
          <p class="score-label">--- ULTIMI SOCI ENTRATI ---</p>
          <ul id="sociList" class="soci-list">
            <li>CARICAMENTO...</li>
          </ul>
        </div>
      </main>
      <script type="module" src="script.js"></script>
    </div>
  </body>
</html>
