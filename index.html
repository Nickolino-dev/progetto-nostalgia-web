<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progetto Nostalgia - Hall of Fame</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="arcade-container">
      <div class="high-score-board">
        <div class="score-label">COMMUNITY SCORE</div>
        <div class="score-number">1024</div>
      </div>
      <h1 class="pixel-title">PROGETTO NOSTALGIA</h1>

      <button id="openModal" class="hall-btn">🏆 HALL OF FAME</button>

      <p class="mission-text">
        Archivio Emozioni Anni '90. <br />
        Inserisci il gettone e scala la classifica!
      </p>

      <div class="input-section">
        <label class="input-label">NICKNAME PLAYER:</label>
        <input
          type="text"
          id="userName"
          class="arcade-input"
          placeholder="ES: TUONOME"
          maxlength="15"
        />

        <label class="input-label">COSA VUOI RIVEDERE?</label>
        <input
          type="text"
          id="userSuggestion"
          class="arcade-input"
          placeholder="ES: MAXIBON ACCORSI"
        />

        <button id="submitBtn" class="start-btn">INVIA GETTONE</button>
        <p
          id="confirmation"
          style="
            display: none;
            color: #ff00ff;
            font-size: 0.6rem;
            margin-top: 10px;
          "
        >
          GETTONE ACCETTATO! 🎟️
        </p>
      </div>
    </div>

    <div id="sociModal" class="modal">
      <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2 class="pixel-title" style="font-size: 0.8rem; margin-top: 10px">
          TOP PLAYERS
        </h2>
        <ul id="sociList" class="soci-list">
          <li>CARICAMENTO SCORE...</li>
        </ul>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
